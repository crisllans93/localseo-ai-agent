<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalSEO AI Agent ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <div class="max-w-4xl mx-auto px-4 py-12">
        <!-- Encabezado -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 mb-2">
                LocalSEO AI Agent ⚡
            </h1>
            <p class="text-slate-400">Generador de Estrategias de SEO Local Automatizado</p>
        </header>

        <!-- Formulario -->
        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl mb-8">
            <form id="seoForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Nombre del Negocio</label>
                    <input type="text" id="business_name" required placeholder="Ej. Pizzería Don Tomas" 
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-slate-100 focus:outline-none focus:border-indigo-500">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Tipo de Negocio</label>
                        <input type="text" id="business_type" required placeholder="Ej. Restaurante Italiano" 
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-slate-100 focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Ciudad / Localidad</label>
                        <input type="text" id="city" required placeholder="Ej. Madrid" 
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-slate-100 focus:outline-none focus:border-indigo-500">
                    </div>
                </div>
                <button type="submit" id="btnSubmit"
                    class="w-full bg-gradient-to-r from-indigo-500 to-cyan-500 hover:from-indigo-600 hover:to-cyan-600 font-bold py-2.5 rounded-lg transition duration-200">
                    Generar Estrategia SEO Local
                </button>
            </form>
        </div>

        <!-- Resultados -->
        <div id="results" class="hidden space-y-6">
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
                <h2 class="text-xl font-bold text-cyan-400 mb-3">📌 Palabras Clave Recomendadas</h2>
                <div id="keywordsList" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
                <h2 class="text-xl font-bold text-indigo-400 mb-4">📝 Publicaciones para Google Business Profile</h2>
                <div id="postsContainer" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- Lógica JavaScript para conectar con el Backend -->
    <script>
        document.getElementById('seoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            const resultsDiv = document.getElementById('results');
            
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Analizando y generando con IA...";
            resultsDiv.classList.add('hidden');

            const payload = {
                business_name: document.getElementById('business_name').value,
                business_type: document.getElementById('business_type').value,
                city: document.getElementById('city').value
            };

            try {
                const response = await fetch('/api/generate-seo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('Error en el servidor');
                const data = await response.json();

                // Renderizar Keywords
                const keywordsList = document.getElementById('keywordsList');
                keywordsList.innerHTML = '';
                data.keywords.forEach(kw => {
                    keywordsList.innerHTML += `<span class="bg-slate-900 border border-slate-600 px-3 py-1 rounded-full text-sm font-medium text-slate-200">${kw}</span>`;
                });

                // Renderizar Publicaciones
                const postsContainer = document.getElementById('postsContainer');
                postsContainer.innerHTML = '';
                data.google_posts.forEach(post => {
                    postsContainer.innerHTML += `
                        <div class="bg-slate-900 p-4 rounded-lg border border-slate-700">
                            <h3 class="font-bold text-slate-200 mb-2">${post.titulo}</h3>
                            <p class="text-sm text-slate-400 whitespace-pre-wrap">${post.contenido}</p>
                        </div>
                    `;
                });

                resultsDiv.classList.remove('hidden');
            } catch (err) {
                alert('Hubo un error al generar la estrategia. Verifica tu configuración.');
                console.error(err);
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Generar Estrategia SEO Local";
            }
        });
    </script>
</body>
</html>
