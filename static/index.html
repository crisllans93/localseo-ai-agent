<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalSEO AI Agent ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4">

    <div class="max-w-3xl mx-auto py-10">
        <h1 class="text-3xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 mb-8">
            LocalSEO AI Agent ⚡
        </h1>

        <!-- Formulario -->
        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
            <form id="seoForm" class="space-y-4">
                <!-- NUEVO: Campo de Correo -->
                <div>
                    <label class="block text-sm font-medium mb-1">Tu Correo Electrónico</label>
                    <input type="email" id="email" required class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="correo@ejemplo.com">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Nombre del Negocio</label>
                    <input type="text" id="business_name" required class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Ej. Pizzeria Don Tomas">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Tipo de Negocio</label>
                        <input type="text" id="business_type" required class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Ej. Restaurante">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Ciudad</label>
                        <input type="text" id="city" required class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Ej. Bogota">
                    </div>
                </div>
                <button type="submit" id="btnSubmit" class="w-full bg-indigo-600 hover:bg-indigo-700 py-2 rounded-lg font-bold transition">
                    Generar Estrategia SEO Local
                </button>
            </form>
        </div>

        <!-- Resultados -->
        <div id="results" class="hidden mt-8 space-y-6">
            <!-- ... (se mantiene igual) ... -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h2 class="text-lg font-bold text-cyan-400 mb-3">✨ Palabras Clave</h2>
                <div id="keywordsList" class="flex flex-wrap gap-2"></div>
            </div>
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h2 class="text-lg font-bold text-indigo-400 mb-4">🚀 Publicaciones para Google</h2>
                <div id="postsContainer" class="space-y-4"></div>
            </div>
            <div id="scriptContainer" class="bg-emerald-900/20 border border-emerald-500/50 p-6 rounded-xl"></div>
        </div>
    </div>

    <script>
        document.getElementById('seoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const resultsDiv = document.getElementById('results');
            
            btn.disabled = true;
            btn.innerText = "Validando y generando...";
            
            const payload = {
                email: document.getElementById('email').value, // Agregado
                business_name: document.getElementById('business_name').value,
                business_type: document.getElementById('business_type').value,
                city: document.getElementById('city').value
            };

            try {
                const response = await fetch('/api/generate-seo', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if (response.status === 403) {
                    alert("⚠️ Has superado tus 3 intentos gratuitos. Contáctame para acceso ilimitado.");
                    btn.disabled = false;
                    btn.innerText = "Generar Estrategia SEO Local";
                    return;
                }

                if (!response.ok) throw new Error("Error en servidor");
                const data = await response.json();

                // Lógica de visualización (igual que antes)
                const kwList = document.getElementById('keywordsList');
                kwList.innerHTML = data.keywords.map(kw => `<span class="bg-slate-900 px-3 py-1 rounded-full text-sm border border-slate-600">${kw}</span>`).join('');

                const postsCont = document.getElementById('postsContainer');
                postsCont.innerHTML = data.google_posts.map(post => `
                    <div class="bg-slate-900 p-4 rounded-lg border border-slate-700">
                        <h3 class="font-bold text-slate-200">${post.titulo}</h3>
                        <p class="text-sm text-slate-400 mt-1">${post.contenido}</p>
                    </div>
                `).join('');

                document.getElementById('scriptContainer').innerHTML = `
                    <h2 class="text-lg font-bold text-emerald-400 mb-2">📩 Script de Prospección</h2>
                    <p class="text-sm text-slate-200 mb-4">${data.sales_script}</p>
                    <button onclick="navigator.clipboard.writeText(\`${data.sales_script}\`)" class="bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded text-xs font-bold transition">
                        📋 Copiar Mensaje
                    </button>
                `;

                resultsDiv.classList.remove('hidden');
            } catch (err) {
                console.error(err);
                alert("Error de conexión. Intenta de nuevo.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Generar Estrategia SEO Local";
            }
        });
    </script>
</body>
</html>
